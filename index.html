<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fernando Del Moral</title>
    <script>
        // Detecta el idioma del navegador
        const userLang = navigator.language || navigator.userLanguage;
        
        // Si es español, va a /es/, de lo contrario entra por defecto a /en/
        if (userLang.startsWith('es')) {
            window.location.replace('/es/');
        } else {
            window.location.replace('/en/');
        }
    </script>
</head>
<body>
    <p>Loading...</p>
</body>
</html>
